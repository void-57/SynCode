<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background with rounded corners -->
  <rect width="100" height="100" rx="18" fill="#111111"/>

  <!-- Top-left red corner accent -->
  <path d="M0,18 Q0,0 18,0 L32,0 L32,6 L20,6 Q6,6 6,20 L6,32 L0,32 Z" fill="#FF3300"/>

  <!-- Bottom-right red corner accent -->
  <path d="M100,82 Q100,100 82,100 L68,100 L68,94 L80,94 Q94,94 94,80 L94,68 L100,68 Z" fill="#FF3300"/>

  <!-- Prompt chevron > -->
  <polyline points="28,38 44,50 28,62" stroke="#FF3300" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Underscore cursor _ -->
  <rect x="50" y="60" width="22" height="5.5" rx="1" fill="#ffffff" opacity="0.85"/>
</svg>
